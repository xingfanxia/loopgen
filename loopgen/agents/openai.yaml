interface:
  display_name: "Loopgen"
  short_description: "Compose a runner-agnostic loop prompt from a primitive vocabulary."
  default_prompt: "Use loopgen to derive a runner-agnostic loop prompt: classify the task to its nearest archetype (frontier / goal / story / greenfield), compose the prompt from primitive values (defaulting to the archetype, diverging where the task demands), and emit with a provenance preamble."
